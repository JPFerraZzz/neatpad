name: Deploy to Ubuntu server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH git pull on server
    runs-on: ubuntu-latest
    steps:
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SSH_PATH: ${{ secrets.SSH_PATH }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        with:
          host: 100.97.91.86
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          envs: SSH_PATH,WEBHOOK_SECRET
          script_stop: true
          script: |
            set -euo pipefail
            PROJECT_PATH="$SSH_PATH"
            cd "$PROJECT_PATH"
            git fetch --prune origin
            git reset --hard origin/main
            git clean -fd \
              --exclude='assets/js/firebase-config.js' \
              --exclude='config.php' \
              --exclude='np-gest/config.php' \
              --exclude='.env'
            echo "── Deploy concluído ──"
            git log -1 --pretty=format:"%h %s (%an, %ar)"

            # Gera patch notes via Ollama para este commit
            COMMIT_HASH=$(git rev-parse HEAD)
            COMMIT_MSG=$(git log -1 --pretty=format:"%s")
            WEBHOOK_PAYLOAD=$(printf '{"commit_hash":"%s","commit_message":"%s"}' \
              "$COMMIT_HASH" \
              "$(echo "$COMMIT_MSG" | sed 's/"/\\"/g')")
            curl -s --max-time 120 \
              -X POST "http://localhost/api/webhook_github.php" \
              -H "Content-Type: application/json" \
              -H "X-Webhook-Secret: ${WEBHOOK_SECRET}" \
              -d "$WEBHOOK_PAYLOAD" \
              && echo "── Patch note gerada ──" \
              || echo "── Webhook falhou (não crítico) ──"
      
      - name: Trigger patch notes generation
        continue-on-error: true
        run: |
          curl -4 -s -X POST \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"commit_hash\": \"${{ github.sha }}\", \"commit_message\": \"${{ github.event.head_commit.message }}\"}" \
            https://neatpad.duckdns.org/api/webhook_github.php || true