<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#5B5BD6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="NeatPad">
    <meta name="mobile-web-app-capable" content="yes">
    <title>NeatPad — Entrar</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        (function () {
            const t = localStorage.getItem('neatpad-theme');
            if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>

    <style>
        /* ── Login page (usa o design system da style.css, sem decoração) ─ */
        .login-shell {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            padding-top: calc(24px + env(safe-area-inset-top, 0));
            padding-bottom: calc(24px + env(safe-area-inset-bottom, 0));
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-brand-icon {
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: #fff;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 14px;
        }

        .login-brand h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        .login-brand h1 span { color: var(--primary); }

        .login-brand p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: var(--bg-subtle);
            border-radius: var(--radius-pill);
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            min-height: 40px;
            border: none;
            background: transparent;
            border-radius: var(--radius-pill);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
        }
        .tab-btn.active {
            background: var(--bg-surface);
            color: var(--text);
            box-shadow: var(--elev-1);
        }

        .form-section { display: none; }
        .form-section.active { display: block; }

        .input-wrap {
            position: relative;
        }
        .input-wrap i {
            position: absolute;
            top: 50%;
            left: 14px;
            transform: translateY(-50%);
            color: var(--text-subtle);
            font-size: 14px;
            pointer-events: none;
        }
        .input-wrap input {
            padding-left: 38px;
        }

        .btn-login {
            width: 100%;
            margin-top: 4px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
            color: var(--text-subtle);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .btn-google {
            width: 100%;
            padding: 11px;
            min-height: var(--touch-min);
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.12s ease, border-color 0.12s ease;
        }
        .btn-google:hover { background: var(--bg-subtle); }

        .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

        .error-msg {
            background: var(--danger-weak);
            border: 1px solid var(--danger);
            color: var(--danger);
            border-radius: var(--radius);
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 12px;
            display: none;
            line-height: 1.4;
        }
        .error-msg.visible { display: block; }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .login-footer {
            text-align: center;
            margin-top: 22px;
            color: var(--text-subtle);
            font-size: 12px;
        }
        .login-footer strong {
            color: var(--text-muted);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-shell">
        <div class="login-wrapper">
            <div class="login-brand">
                <div class="login-brand-icon">
                    <i class="fas fa-feather-alt"></i>
                </div>
                <h1>Neat<span>Pad</span></h1>
                <p>O teu bloco de notas organizado</p>
            </div>

            <div class="login-card">
                <div class="tabs" role="tablist">
                    <button type="button" class="tab-btn active" onclick="switchTab('login')">Entrar</button>
                    <button type="button" class="tab-btn" onclick="switchTab('register')">Criar conta</button>
                </div>

                <!-- Login -->
                <div class="form-section active" id="loginSection">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="loginEmail" class="form-control" placeholder="o.teu@email.com" autocomplete="email">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="loginPassword" class="form-control" placeholder="A tua password" autocomplete="current-password">
                        </div>
                    </div>
                    <button class="btn btn-primary btn-login" id="loginBtn" onclick="loginEmail()" type="button">
                        Entrar <i class="fas fa-arrow-right"></i>
                    </button>

                    <div class="divider">ou</div>

                    <button class="btn-google" onclick="loginGoogle()" type="button">
                        <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Continuar com Google
                    </button>

                    <div class="error-msg" id="loginError"></div>
                </div>

                <!-- Registo -->
                <div class="form-section" id="registerSection">
                    <div class="form-group">
                        <label for="registerName">Nome</label>
                        <div class="input-wrap">
                            <i class="fas fa-user"></i>
                            <input type="text" id="registerName" class="form-control" placeholder="O teu nome" autocomplete="name">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="registerEmail" class="form-control" placeholder="o.teu@email.com" autocomplete="email">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="registerPassword" class="form-control" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                        </div>
                    </div>
                    <button class="btn btn-primary btn-login" id="registerBtn" onclick="registerEmail()" type="button">
                        Criar conta <i class="fas fa-arrow-right"></i>
                    </button>

                    <div class="divider">ou</div>

                    <button class="btn-google" onclick="loginGoogle()" type="button">
                        <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Continuar com Google
                    </button>

                    <div class="error-msg" id="registerError"></div>
                </div>
            </div>

            <p class="login-footer">NeatPad · <strong>FerrazWeb</strong> &copy; 2026</p>
        </div>
    </div>

    <!-- Install gate (bloqueia uso em browser mobile fora do PWA) -->
    <div id="pwa-install-gate" role="dialog" aria-modal="true" aria-labelledby="pwaGateTitleLogin">
        <div class="gate-box">
            <div class="gate-icon"><i class="fas fa-feather-alt"></i></div>
            <h2 class="gate-title" id="pwaGateTitleLogin">Instala o NeatPad</h2>
            <p class="gate-lead">
                Em telemóvel, o NeatPad só funciona instalado no ecrã inicial.
                Segue as instruções para instalar. Depois abres a app pelo ícone.
            </p>

            <div class="gate-tabs" role="tablist">
                <button type="button" role="tab" data-gate-tab="ios" aria-selected="false">iPhone / iPad</button>
                <button type="button" role="tab" data-gate-tab="android" aria-selected="false">Android</button>
            </div>

            <ol class="gate-steps" id="gateSteps"></ol>

            <button class="btn btn-primary gate-install-btn" id="gateInstallBtn" type="button" style="display:none;">
                <i class="fas fa-download"></i> Instalar agora
            </button>

            <p class="gate-footer">Depois de instalado, abre o ícone do NeatPad no ecrã inicial.</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="assets/js/firebase-config.js?v=2"></script>
    <script src="assets/js/auth.js?v=2"></script>
    <script src="assets/js/pwa.js" defer></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach((b, i) =>
                b.classList.toggle('active', (tab === 'login') === (i === 0))
            );
            document.getElementById('loginSection').classList.toggle('active', tab === 'login');
            document.getElementById('registerSection').classList.toggle('active', tab === 'register');
        }

        document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') loginEmail(); });
        document.getElementById('registerPassword').addEventListener('keydown', e => { if (e.key === 'Enter') registerEmail(); });
    </script>
</body>
</html>
