<!DOCTYPE html>
<html lang="pt-PT" data-theme="light" class="docs-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NeatPad — Documentação e patch notes. Registo de actualizações da aplicação.">
    <title>NeatPad Docs — Patch Notes</title>

    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .docs-html { scroll-behavior: smooth; }
        .docs-page {
            margin: 0;
            min-height: 100dvh;
            background: var(--bg);
            color: var(--text);
        }

        /* ── Layout em colunas ─────────────────────────────────── */
        .docs-layout {
            display: flex;
            min-height: 100dvh;
        }

        .docs-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100dvh;
            z-index: 200;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transform: translateX(0);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }
        .docs-sidebar-inner {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            padding: 20px 16px 16px;
        }
        .docs-sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .docs-sidebar-brand-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius);
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .docs-sidebar-brand-text {
            font-weight: 800;
            font-size: 15px;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        .docs-sidebar-brand-sub {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .docs-sidebar-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-subtle);
            margin: 20px 0 8px;
        }
        .docs-sidebar-label:first-of-type { margin-top: 4px; }

        .docs-filter-stack {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-shrink: 0;
        }
        .docs-filter-btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            min-height: 44px;
            padding: 0 12px;
            border-radius: var(--radius);
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
        }
        .docs-filter-btn:hover {
            background: var(--bg-subtle);
            color: var(--text);
        }
        .docs-filter-btn.active {
            background: var(--primary-weak);
            color: var(--primary);
            border-color: var(--primary);
        }

        .docs-toc {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            margin: 0 -6px;
            padding: 4px 6px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .docs-toc-link {
            display: block;
            padding: 10px 10px;
            border-radius: var(--radius);
            font-size: 12px;
            line-height: 1.35;
            color: var(--text-muted);
            text-decoration: none;
            border: 1px solid transparent;
            transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
        }
        .docs-toc-link:hover {
            background: var(--bg-subtle);
            color: var(--text);
        }
        .docs-toc-link-date {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 2px;
        }
        .docs-toc-link-title {
            color: inherit;
            font-weight: 600;
        }

        .docs-sidebar-footer {
            flex-shrink: 0;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            margin-top: 8px;
        }
        .docs-link-neatpad {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 48px;
            padding: 0 10px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            text-decoration: none;
            transition: background 0.12s ease;
        }
        .docs-link-neatpad:hover {
            background: var(--primary-weak);
        }
        .docs-sidebar-theme {
            margin-top: 4px;
            width: 100%;
            min-height: 48px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            transition: border-color 0.12s ease, color 0.12s ease;
        }
        .docs-sidebar-theme:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .docs-scrim {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 150;
            background: rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .docs-scrim.visible {
            display: block;
            opacity: 1;
        }

        .docs-main-col {
            flex: 1;
            margin-left: 240px;
            min-width: 0;
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
        }

        .docs-topbar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            min-height: 56px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 120;
            flex-shrink: 0;
        }
        .docs-topbar-hamburger {
            display: none;
            width: 48px;
            height: 48px;
            border: none;
            border-radius: var(--radius);
            background: var(--bg-subtle);
            color: var(--text);
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }
        .docs-topbar-title {
            flex: 1;
            min-width: 0;
        }
        .docs-topbar-title h1 {
            margin: 0;
            font-size: 17px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        .docs-topbar-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .docs-topbar-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 48px;
            min-height: 48px;
            padding: 0 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
        }
        .docs-topbar-back:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .docs-topbar-theme {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
        }
        .docs-topbar-theme:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .docs-filters-mobile {
            display: none;
            gap: 8px;
            padding: 10px 14px 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border);
            background: var(--bg-surface);
            flex-shrink: 0;
        }
        .docs-filters-mobile::-webkit-scrollbar { display: none; }
        .docs-filters-mobile .docs-filter-btn {
            flex-shrink: 0;
            min-height: 48px;
            padding: 0 18px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border);
            background: var(--bg);
        }
        .docs-filters-mobile .docs-filter-btn.active {
            border-color: var(--primary);
        }

        .docs-feed {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px 80px;
            max-width: 820px;
        }
        .docs-feed-intro {
            margin-bottom: 40px;
        }
        .docs-feed-intro h2 {
            margin: 0 0 10px;
            font-size: clamp(28px, 4vw, 36px);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.15;
            color: var(--text);
        }
        .docs-feed-intro p {
            margin: 0;
            font-size: 16px;
            line-height: 1.65;
            color: var(--text-muted);
            max-width: 52ch;
        }

        /* ── Badges ─────────────────────────────────────────────── */
        .pn-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 5px 12px;
            border-radius: var(--radius-pill);
        }
        .pn-badge--feat     { background: #EDE9FE; color: #6D28D9; }
        .pn-badge--refactor { background: #DBEAFE; color: #1D4ED8; }
        .pn-badge--fix      { background: var(--danger-weak); color: var(--danger); }
        .pn-badge--other    { background: var(--bg-muted); color: var(--text-muted); }
        [data-theme="dark"] .pn-badge--feat     { background: #2D1F5E; color: #C4B5FD; }
        [data-theme="dark"] .pn-badge--refactor { background: rgba(37, 99, 235, 0.22); color: #93C5FD; }
        [data-theme="dark"] .pn-badge--fix     { background: var(--danger-weak); color: var(--danger); }
        [data-theme="dark"] .pn-badge--other   { background: var(--bg-muted); color: var(--text-muted); }

        .docs-entry {
            scroll-margin-top: 100px;
            padding-bottom: 48px;
            margin-bottom: 48px;
            border-bottom: 1px solid var(--border);
        }
        .docs-entry:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .docs-entry--focus {
            outline: 2px solid var(--primary);
            outline-offset: 8px;
            border-radius: var(--radius-lg);
        }
        .docs-entry-head {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 14px;
            margin-bottom: 16px;
        }
        .docs-entry-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            width: 100%;
            margin-top: 4px;
        }
        .docs-entry-date {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .docs-entry-sha {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--radius-pill);
            font-size: 12px;
            font-weight: 600;
            font-family: var(--font-mono);
            background: var(--bg-muted);
            color: var(--text);
            text-decoration: none;
            border: 1px solid var(--border);
            transition: border-color 0.12s ease, background 0.12s ease, color 0.12s ease;
        }
        .docs-entry-sha:hover {
            border-color: var(--primary);
            background: var(--primary-weak);
            color: var(--primary);
        }
        .docs-entry-title {
            margin: 0 0 20px;
            font-size: clamp(22px, 3vw, 28px);
            font-weight: 800;
            letter-spacing: -0.025em;
            line-height: 1.2;
            color: var(--text);
        }
        .docs-entry-summary {
            font-size: 16px;
            line-height: 1.75;
            color: var(--text);
            margin-bottom: 24px;
        }
        .docs-entry-section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-subtle);
            margin: 0 0 12px;
        }
        .docs-entry-changes {
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 22px;
            margin-bottom: 20px;
        }
        .docs-entry-changes ul {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .docs-entry-changes li {
            position: relative;
            padding-left: 18px;
            font-size: 15px;
            line-height: 1.55;
            color: var(--text);
        }
        .docs-entry-changes li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.55em;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
        }
        .docs-entry-impact {
            background: var(--primary-weak);
            border: 1px solid var(--primary);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }
        .docs-entry-impact i {
            color: var(--primary);
            font-size: 18px;
            margin-top: 2px;
            flex-shrink: 0;
        }
        .docs-entry-impact p {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.55;
            color: var(--text);
        }
        .docs-entry-commit {
            margin-top: 24px;
            padding: 16px 18px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .docs-entry-commit-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-subtle);
            margin-bottom: 8px;
        }
        .docs-entry-commit-msg {
            font-size: 13px;
            font-family: var(--font-mono);
            color: var(--text-muted);
            word-break: break-word;
            line-height: 1.5;
        }

        .docs-entry-toggle {
            display: none;
            width: 100%;
            min-height: 48px;
            margin-top: 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--primary);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .docs-entry-body {
            overflow: hidden;
            transition: max-height 0.28s ease;
        }

        .docs-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 80px 24px;
            text-align: center;
            color: var(--text-muted);
        }
        .docs-state i { font-size: 40px; opacity: 0.45; }
        .docs-state p { margin: 0; font-size: 15px; max-width: 360px; line-height: 1.55; }
        .docs-state--error i { color: var(--danger); opacity: 0.8; }

        .docs-skel-block {
            padding: 28px 0;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
        }
        .docs-skel-line {
            height: 14px;
            border-radius: 7px;
            background: linear-gradient(90deg, var(--bg-muted) 25%, var(--bg-subtle) 50%, var(--bg-muted) 75%);
            background-size: 200% 100%;
            animation: docsSkel 1.4s ease infinite;
            margin-bottom: 14px;
        }
        @keyframes docsSkel {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── Tablet: sidebar colapsável ────────────────────────── */
        @media (min-width: 768px) and (max-width: 1024px) {
            .docs-topbar { display: flex; }
            .docs-topbar-hamburger { display: inline-flex; align-items: center; justify-content: center; }
            .docs-main-col { margin-left: 0; }
            .docs-sidebar {
                transform: translateX(-100%);
                box-shadow: none;
            }
            .docs-layout.docs-sidebar-open .docs-sidebar {
                transform: translateX(0);
                box-shadow: var(--elev-3);
            }
            .docs-layout.docs-sidebar-open .docs-scrim.visible {
                display: block;
                opacity: 1;
            }
            .docs-feed { padding: 24px 28px 64px; max-width: none; }
            .docs-sidebar-theme { display: none; }
        }

        /* ── Mobile ─────────────────────────────────────────────── */
        @media (max-width: 767px) {
            .docs-topbar { display: flex; }
            .docs-topbar-hamburger { display: inline-flex; align-items: center; justify-content: center; }
            .docs-main-col { margin-left: 0; }
            .docs-sidebar {
                transform: translateX(-100%);
            }
            .docs-layout.docs-sidebar-open .docs-sidebar {
                transform: translateX(0);
                box-shadow: var(--elev-3);
            }
            .docs-layout.docs-sidebar-open .docs-scrim.visible {
                display: block;
                opacity: 1;
            }
            .docs-filters-mobile { display: flex; }
            .docs-feed { padding: 20px 16px 72px; max-width: none; }
            .docs-feed-intro { margin-bottom: 28px; }
            .docs-feed-intro h2 { font-size: 24px; }
            .docs-entry { scroll-margin-top: 140px; padding-bottom: 28px; margin-bottom: 28px; }
            .docs-entry-title { font-size: 19px; margin-bottom: 14px; }
            .docs-entry-toggle { display: block; }
            .docs-entry--collapsed .docs-entry-body {
                max-height: 0 !important;
                opacity: 0;
                margin: 0 !important;
                padding-top: 0 !important;
                padding-bottom: 0 !important;
                overflow: hidden;
                pointer-events: none;
            }
            .docs-entry:not(.docs-entry--collapsed) .docs-entry-body {
                max-height: none;
                opacity: 1;
                pointer-events: auto;
            }
            .docs-entry--collapsed .docs-entry-toggle .docs-entry-toggle-text::after {
                content: ' — Ver mais';
            }
            .docs-entry:not(.docs-entry--collapsed) .docs-entry-toggle .docs-entry-toggle-text::after {
                content: ' — Ver menos';
            }
            .docs-sidebar-theme { display: none; }
        }

        /* ── Desktop: sidebar sempre visível ───────────────────── */
        @media (min-width: 1025px) {
            .docs-topbar { display: none; }
            .docs-filters-mobile { display: none; }
            .docs-main-col { margin-left: 240px; }
            .docs-sidebar { transform: translateX(0) !important; }
            .docs-scrim { display: none !important; }
        }
    </style>
</head>
<body class="docs-page">
    <div class="docs-layout" id="docsLayout">
        <aside class="docs-sidebar" id="docsSidebar" aria-label="Navegação documentação">
            <div class="docs-sidebar-inner">
                <a href="docs.html" class="docs-sidebar-brand">
                    <span class="docs-sidebar-brand-icon"><i class="fas fa-book-open"></i></span>
                    <span>
                        <span class="docs-sidebar-brand-text">NeatPad Docs</span>
                        <span class="docs-sidebar-brand-sub">Patch notes</span>
                    </span>
                </a>

                <span class="docs-sidebar-label">Filtrar</span>
                <div class="docs-filter-stack" id="docsFilterSidebar" role="group" aria-label="Filtrar por tipo">
                    <button type="button" class="docs-filter-btn active" data-f="all">Todos</button>
                    <button type="button" class="docs-filter-btn" data-f="feat">Funcionalidades</button>
                    <button type="button" class="docs-filter-btn" data-f="fix">Correcções</button>
                    <button type="button" class="docs-filter-btn" data-f="other">Outros</button>
                </div>

                <span class="docs-sidebar-label">Nesta página</span>
                <nav class="docs-toc" id="docsToc" aria-label="Índice de versões"></nav>

                <div class="docs-sidebar-footer">
                    <a href="/" class="docs-link-neatpad"><i class="fas fa-arrow-left"></i> Voltar ao NeatPad</a>
                    <button type="button" class="docs-sidebar-theme" id="themeToggleSide" title="Tema" aria-label="Alternar tema">
                        <i class="fas fa-moon" id="themeIconSide"></i>
                    </button>
                </div>
            </div>
        </aside>

        <div class="docs-scrim" id="docsScrim" aria-hidden="true"></div>

        <div class="docs-main-col">
            <header class="docs-topbar">
                <button type="button" class="docs-topbar-hamburger" id="docsMenuBtn" aria-label="Abrir menu" aria-expanded="false">
                    <i class="fas fa-bars"></i>
                </button>
                <a href="/" class="docs-topbar-back"><i class="fas fa-arrow-left"></i> NeatPad</a>
                <div class="docs-topbar-title">
                    <h1>Docs</h1>
                </div>
                <div class="docs-topbar-actions">
                    <button type="button" class="docs-topbar-theme" id="themeToggleTop" title="Tema" aria-label="Alternar tema">
                        <i class="fas fa-moon" id="themeIconTop"></i>
                    </button>
                </div>
            </header>

            <div class="docs-filters-mobile" id="docsFilterMobile" role="group" aria-label="Filtrar por tipo">
                <button type="button" class="docs-filter-btn active" data-f="all">Todos</button>
                <button type="button" class="docs-filter-btn" data-f="feat">Funcionalidades</button>
                <button type="button" class="docs-filter-btn" data-f="fix">Correcções</button>
                <button type="button" class="docs-filter-btn" data-f="other">Outros</button>
            </div>

            <main class="docs-feed" id="docsFeed"></main>
        </div>
    </div>

    <script>
    (function () {
        const saved = localStorage.getItem('neatpad-theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        syncThemeIcons(saved);
    })();

    function syncThemeIcons(theme) {
        const moon = 'fas fa-moon';
        const sun = 'fas fa-sun';
        const icon = theme === 'dark' ? sun : moon;
        ['themeIconSide', 'themeIconTop'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.className = icon;
        });
    }

    function bindTheme(btnId) {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        btn.addEventListener('click', () => {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('neatpad-theme', next);
            syncThemeIcons(next);
        });
    }
    bindTheme('themeToggleSide');
    bindTheme('themeToggleTop');

    function esc(str) {
        const d = document.createElement('div');
        d.textContent = str == null ? '' : String(str);
        return d.innerHTML;
    }

    function _firstSentence(text) {
        if (!text) return '';
        const m = String(text).match(/^[^.\n]+/);
        return m ? m[0].trim() : String(text).trim();
    }
    function _afterFirstSentence(text) {
        if (!text) return '';
        const first = _firstSentence(text);
        return String(text).slice(first.length).trim().replace(/^[.,:]\s*/, '');
    }

    function badgeHtml(type) {
        const t = String(type || 'other').toLowerCase();
        const map = {
            feat:     { cls: 'pn-badge--feat',     icon: 'fa-star',                 label: 'Funcionalidade' },
            refactor: { cls: 'pn-badge--refactor', icon: 'fa-wand-magic-sparkles', label: 'Melhoria' },
            fix:      { cls: 'pn-badge--fix',      icon: 'fa-wrench',               label: 'Correção' },
            other:    { cls: 'pn-badge--other',    icon: 'fa-circle-nodes',         label: 'Outro' },
        };
        const meta = map[t] || map.other;
        return `<span class="pn-badge ${meta.cls}"><i class="fas ${meta.icon}"></i>${meta.label}</span>`;
    }

    let docsPatchNotes = [];
    let docsListFilter = 'all';
    const docsLayout = document.getElementById('docsLayout');
    const docsSidebar = document.getElementById('docsSidebar');
    const docsScrim = document.getElementById('docsScrim');
    const docsFeed = document.getElementById('docsFeed');
    const docsToc = document.getElementById('docsToc');

    function matchesDocsFilter(pn, filter) {
        const t = String(pn.type || 'other').toLowerCase();
        if (filter === 'all') return true;
        if (filter === 'feat') return t === 'feat' || t === 'refactor';
        if (filter === 'fix') return t === 'fix';
        if (filter === 'other') return t !== 'feat' && t !== 'refactor' && t !== 'fix';
        return true;
    }

    function setFilter(f) {
        docsListFilter = f;
        document.querySelectorAll('.docs-filter-btn').forEach(b => {
            b.classList.toggle('active', (b.getAttribute('data-f') || '') === f);
        });
        renderFeedAndToc();
    }

    document.getElementById('docsFilterSidebar').addEventListener('click', e => {
        const btn = e.target.closest('[data-f]');
        if (!btn) return;
        setFilter(btn.getAttribute('data-f') || 'all');
    });
    document.getElementById('docsFilterMobile').addEventListener('click', e => {
        const btn = e.target.closest('[data-f]');
        if (!btn) return;
        setFilter(btn.getAttribute('data-f') || 'all');
    });

    function closeSidebar() {
        docsLayout.classList.remove('docs-sidebar-open');
        docsScrim.classList.remove('visible');
        docsScrim.setAttribute('aria-hidden', 'true');
        const m = document.getElementById('docsMenuBtn');
        if (m) { m.setAttribute('aria-expanded', 'false'); }
    }
    function openSidebar() {
        docsLayout.classList.add('docs-sidebar-open');
        docsScrim.classList.add('visible');
        docsScrim.setAttribute('aria-hidden', 'false');
        const m = document.getElementById('docsMenuBtn');
        if (m) { m.setAttribute('aria-expanded', 'true'); }
    }

    document.getElementById('docsMenuBtn').addEventListener('click', () => {
        if (docsLayout.classList.contains('docs-sidebar-open')) closeSidebar();
        else openSidebar();
    });
    docsScrim.addEventListener('click', closeSidebar);
    window.addEventListener('resize', () => {
        if (window.innerWidth >= 1025) closeSidebar();
    });

    function tocTitle(pn) {
        return pn.title || _firstSentence(pn.generated_notes) || pn.commit_message || 'Actualização';
    }

    function renderToc(rows) {
        if (!rows.length) {
            docsToc.innerHTML = '<p style="font-size:12px;color:var(--text-subtle);padding:8px;">Sem entradas visíveis.</p>';
            return;
        }
        docsToc.innerHTML = rows.map(pn => {
            const title = tocTitle(pn);
            const shortTitle = title.length > 48 ? title.slice(0, 46) + '…' : title;
            return `<a class="docs-toc-link" href="#pn-${pn.id}">
                <span class="docs-toc-link-date">${esc(pn.date_formatted)}</span>
                <span class="docs-toc-link-title">${esc(shortTitle)}</span>
            </a>`;
        }).join('');

        docsToc.querySelectorAll('a[href^="#"]').forEach(a => {
            a.addEventListener('click', ev => {
                ev.preventDefault();
                const id = a.getAttribute('href').slice(1);
                const target = document.getElementById(id);
                closeSidebar();
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    target.classList.add('docs-entry--focus');
                    setTimeout(() => target.classList.remove('docs-entry--focus'), 2400);
                }
            });
        });
    }

    function entryHtml(pn) {
        const short = (pn.commit_hash || '').slice(0, 7);
        const title = pn.title || _firstSentence(pn.generated_notes) || pn.commit_message;
        const summary = pn.summary || _afterFirstSentence(pn.generated_notes) || pn.generated_notes || pn.commit_message;
        const changes = Array.isArray(pn.changes) && pn.changes.length ? pn.changes : null;
        const impact = pn.impact || null;
        const changesBlock = changes ? `
            <div class="docs-entry-changes">
                <h3 class="docs-entry-section-title">Alterações</h3>
                <ul>${changes.map(c => `<li>${esc(c)}</li>`).join('')}</ul>
            </div>` : '';
        const impactBlock = impact ? `
            <div class="docs-entry-impact">
                <i class="fas fa-circle-check" aria-hidden="true"></i>
                <div>
                    <h3 class="docs-entry-section-title" style="margin-bottom:6px">Impacto</h3>
                    <p>${esc(impact)}</p>
                </div>
            </div>` : '';

        return `
            <article class="docs-entry docs-entry--collapsed" id="pn-${pn.id}" data-entry-id="${pn.id}">
                <header class="docs-entry-head">
                    ${badgeHtml(pn.type)}
                    <div class="docs-entry-meta">
                        <span class="docs-entry-date"><i class="fas fa-calendar-alt" aria-hidden="true"></i> ${esc(pn.date_formatted)}</span>
                        <a class="docs-entry-sha" href="${esc(pn.commit_url)}" target="_blank" rel="noopener noreferrer"><i class="fab fa-github" aria-hidden="true"></i>${esc(short)}</a>
                    </div>
                </header>
                <h2 class="docs-entry-title">${esc(title)}</h2>
                <div class="docs-entry-body">
                    <p class="docs-entry-summary">${esc(summary)}</p>
                    ${changesBlock}
                    ${impactBlock}
                    <div class="docs-entry-commit">
                        <div class="docs-entry-commit-label">Commit original</div>
                        <div class="docs-entry-commit-msg">${esc(pn.commit_message || '')}</div>
                    </div>
                </div>
                <button type="button" class="docs-entry-toggle" aria-expanded="false">
                    <span class="docs-entry-toggle-text">Detalhes</span>
                </button>
            </article>`;
    }

    function setupMobileToggles() {
        const isMobile = () => window.matchMedia('(max-width: 767px)').matches;
        docsFeed.querySelectorAll('.docs-entry').forEach(article => {
            const btn = article.querySelector('.docs-entry-toggle');
            const body = article.querySelector('.docs-entry-body');
            if (!btn || !body) return;

            if (isMobile()) {
                article.classList.add('docs-entry--collapsed');
                btn.setAttribute('aria-expanded', 'false');
                body.style.maxHeight = '';
            } else {
                article.classList.remove('docs-entry--collapsed');
                btn.setAttribute('aria-expanded', 'true');
                body.style.maxHeight = '';
            }

            btn.onclick = () => {
                if (!isMobile()) return;
                const collapsed = article.classList.toggle('docs-entry--collapsed');
                btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
            };
        });
    }

    let docsResizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(docsResizeTimer);
        docsResizeTimer = setTimeout(() => {
            if (!docsFeed.querySelector('.docs-entry')) return;
            setupMobileToggles();
        }, 120);
    });

    function renderFeedAndToc() {
        const rows = docsPatchNotes.filter(pn => matchesDocsFilter(pn, docsListFilter));
        if (!rows.length) {
            docsFeed.innerHTML = `
                <div class="docs-feed-intro">
                    <h2>Patch notes</h2>
                    <p>Nenhuma entrada corresponde a este filtro.</p>
                </div>
                <div class="docs-state"><i class="fas fa-filter"></i><p>Tenta outro tipo de alteração.</p></div>`;
            renderToc([]);
            return;
        }

        docsFeed.innerHTML = `
            <div class="docs-feed-intro">
                <h2>Patch notes</h2>
                <p>Registo cronológico das actualizações ao NeatPad. Usa o índice à esquerda para saltar entre versões.</p>
            </div>
            ${rows.map(entryHtml).join('')}
        `;
        renderToc(rows);
        setupMobileToggles();
    }

    function showLoadingSkeleton() {
        docsFeed.innerHTML = `
            <div class="docs-feed-intro">
                <div class="docs-skel-line" style="width:40%;height:28px;margin-bottom:16px"></div>
                <div class="docs-skel-line" style="width:85%"></div>
            </div>
            ${[1, 2, 3].map(() => `
                <div class="docs-skel-block">
                    <div class="docs-skel-line" style="width:22%"></div>
                    <div class="docs-skel-line" style="width:70%;height:22px"></div>
                    <div class="docs-skel-line" style="width:100%"></div>
                    <div class="docs-skel-line" style="width:92%"></div>
                </div>`).join('')}
        `;
        docsToc.innerHTML = '<p style="font-size:12px;color:var(--text-subtle);padding:8px;">A carregar…</p>';
    }

    function highlightEntry(id) {
        requestAnimationFrame(() => {
            const el = document.getElementById('pn-' + id);
            if (!el) return;
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.remove('docs-entry--collapsed');
            const body = el.querySelector('.docs-entry-body');
            const btn = el.querySelector('.docs-entry-toggle');
            if (body) body.style.maxHeight = 'none';
            if (btn) btn.setAttribute('aria-expanded', 'true');
            el.classList.add('docs-entry--focus');
            setTimeout(() => el.classList.remove('docs-entry--focus'), 2600);
        });
    }

    async function loadNotesAndRender(focusId) {
        showLoadingSkeleton();
        try {
            const resp = await fetch('api/get_patch_notes.php?limit=100');
            const json = await resp.json();

            if (!json.success || !Array.isArray(json.data) || json.data.length === 0) {
                docsFeed.innerHTML = `
                    <div class="docs-feed-intro"><h2>Patch notes</h2><p>Ainda não há publicações.</p></div>
                    <div class="docs-state"><i class="fas fa-inbox"></i><p>Quando houver deploys com notas, aparecem aqui.</p></div>`;
                docsToc.innerHTML = '';
                return;
            }

            docsPatchNotes = json.data.slice().sort((a, b) =>
                String(b.created_at || '').localeCompare(String(a.created_at || ''))
            );

            if (focusId) {
                const has = docsPatchNotes.some(p => Number(p.id) === focusId);
                if (!has) {
                    const dr = await fetch('api/get_patch_notes.php?id=' + focusId);
                    const dj = await dr.json();
                    if (dj.success && dj.data) docsPatchNotes.unshift(dj.data);
                }
            }

            docsListFilter = 'all';
            document.querySelectorAll('.docs-filter-btn').forEach(b => {
                b.classList.toggle('active', b.getAttribute('data-f') === 'all');
            });
            renderFeedAndToc();

            if (focusId) {
                highlightEntry(focusId);
                const pnF = docsPatchNotes.find(p => Number(p.id) === focusId);
                if (pnF) document.title = `${tocTitle(pnF)} — NeatPad Docs`;
            }
        } catch (err) {
            docsFeed.innerHTML = `
                <div class="docs-state docs-state--error">
                    <i class="fas fa-triangle-exclamation"></i>
                    <p>Não foi possível carregar as patch notes.<br><small>${esc(err.message)}</small></p>
                </div>`;
            docsToc.innerHTML = '';
        }
    }

    const params = new URLSearchParams(window.location.search);
    const focusId = params.get('id') ? parseInt(params.get('id'), 10) : null;
    const validFocus = focusId && focusId > 0 ? focusId : null;

    loadNotesAndRender(validFocus);
    </script>
</body>
</html>
