<!DOCTYPE html>
<html lang="pt-PT" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NeatPad — Patch Notes. Registo completo das actualizações e melhorias da aplicação.">
    <title>NeatPad — Patch Notes</title>

    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Design system NeatPad (tokens + componentes base) -->
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        /* ── Reset de overrides específicos da app principal ─── */
        body {
            padding-bottom: 0;           /* sem bottom-bar nesta página */
            min-height: 100vh;
        }
        @media (max-width: 767px) {
            body { padding-bottom: 0; }
        }

        /* ── Layout docs ──────────────────────────────────────── */
        .docs-wrap {
            max-width: 740px;
            margin: 0 auto;
            padding: 24px 20px 64px;
        }

        /* ── Header ───────────────────────────────────────────── */
        .docs-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 0 28px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 36px;
            flex-wrap: wrap;
        }
        .docs-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }
        .docs-brand-icon {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            flex-shrink: 0;
        }
        .docs-brand-name {
            font-size: 17px;
            font-weight: 800;
            letter-spacing: -.02em;
        }
        .docs-brand-sep {
            color: var(--border-strong);
            font-size: 20px;
            font-weight: 200;
            margin: 0 2px;
        }
        .docs-brand-sub {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }
        .docs-header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .docs-theme-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            transition: border-color .15s ease, color .15s ease, background .15s ease;
        }
        .docs-theme-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .docs-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            padding: 7px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-surface);
            transition: border-color .15s, color .15s;
        }
        .docs-back-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ── Intro (lista) ────────────────────────────────────── */
        .docs-intro {
            margin-bottom: 36px;
        }
        .docs-intro h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -.025em;
            line-height: 1.15;
            color: var(--text);
            margin-bottom: 8px;
        }
        .docs-intro p {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* ── Badge de tipo ────────────────────────────────────── */
        .pn-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
            padding: 3px 10px;
            border-radius: var(--radius-pill);
            flex-shrink: 0;
        }
        .pn-badge--feat   { background: #EDE9FE; color: #6D28D9; }
        .pn-badge--fix    { background: var(--danger-weak); color: var(--danger); }
        .pn-badge--other  { background: var(--bg-muted); color: var(--text-muted); }
        [data-theme="dark"] .pn-badge--feat  { background: #2D1F5E; color: #C4B5FD; }
        [data-theme="dark"] .pn-badge--fix   { background: var(--danger-weak); color: var(--danger); }
        [data-theme="dark"] .pn-badge--other { background: var(--bg-muted); color: var(--text-muted); }

        /* ── Card de patch note (lista) ───────────────────────── */
        .pn-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .pn-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 22px;
            transition: border-color .15s ease, box-shadow .15s ease;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            display: block;
        }
        .pn-card:hover {
            border-color: var(--primary);
            box-shadow: var(--elev-1);
        }
        .pn-card-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .pn-date {
            font-size: 12px;
            color: var(--text-subtle);
            margin-left: auto;
            white-space: nowrap;
        }
        .pn-title {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.4;
            color: var(--text);
            margin-bottom: 6px;
        }
        .pn-preview {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .pn-card-footer {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .pn-sha {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--text-subtle);
            background: var(--bg-muted);
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            transition: color .12s, background .12s;
            letter-spacing: .04em;
        }
        .pn-sha:hover {
            color: var(--primary);
            background: var(--primary-weak);
        }
        .pn-read-more {
            margin-left: auto;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ── Vista de detalhe ─────────────────────────────────── */
        .pn-detail-header {
            margin-bottom: 28px;
        }
        .pn-detail-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .pn-detail-date {
            font-size: 13px;
            color: var(--text-muted);
        }
        .pn-detail-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -.025em;
            line-height: 1.2;
            color: var(--text);
            margin-bottom: 20px;
        }
        .pn-detail-body {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px 26px;
            font-size: 15px;
            line-height: 1.75;
            color: var(--text);
            margin-bottom: 16px;
            white-space: pre-line;
        }
        /* Bloco "O que mudou" — lista de alterações */
        .pn-detail-changes {
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px 22px;
            margin-bottom: 16px;
        }
        .pn-detail-section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--text-subtle);
            margin-bottom: 10px;
        }
        .pn-changes-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }
        .pn-changes-list li {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text);
        }
        .pn-changes-list li::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            flex-shrink: 0;
            margin-top: 6px;
        }
        /* Bloco "Impacto" */
        .pn-detail-impact {
            background: var(--primary-weak);
            border: 1px solid var(--primary);
            border-radius: var(--radius-lg);
            padding: 14px 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .pn-detail-impact i {
            color: var(--primary);
            margin-top: 2px;
            flex-shrink: 0;
        }
        .pn-detail-impact-text {
            font-size: 14px;
            line-height: 1.55;
            color: var(--text);
            font-weight: 500;
        }
        .pn-detail-commit {
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .pn-detail-commit-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-subtle);
            margin-bottom: 4px;
        }
        .pn-detail-commit-msg {
            font-size: 13px;
            font-family: var(--font-mono);
            color: var(--text-muted);
            word-break: break-all;
        }
        .pn-detail-commit-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            text-decoration: none;
            margin-top: 6px;
        }
        .pn-detail-commit-link:hover { text-decoration: underline; }

        /* ── Estado de loading / erro / vazio ─────────────────── */
        .docs-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 64px 24px;
            color: var(--text-muted);
            text-align: center;
        }
        .docs-state i { font-size: 36px; opacity: .5; }
        .docs-state p { font-size: 14px; }

        /* Skeleton de loading */
        .pn-skel {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 22px;
        }
        .pn-skel-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--bg-muted) 25%, var(--bg-subtle) 50%, var(--bg-muted) 75%);
            background-size: 200% 100%;
            animation: skelPulse 1.4s ease infinite;
            margin-bottom: 10px;
        }
        @keyframes skelPulse {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 640px) {
            .docs-intro h1 { font-size: 22px; }
            .pn-detail-title { font-size: 20px; }
            .pn-card { padding: 16px; }
            .pn-date { margin-left: 0; width: 100%; order: 3; }
        }
    </style>
</head>
<body>
    <div class="docs-wrap">

        <!-- Header -->
        <header class="docs-header">
            <a href="/" class="docs-brand" title="Voltar à aplicação">
                <div class="docs-brand-icon"><i class="fas fa-book-open"></i></div>
                <span class="docs-brand-name">NeatPad</span>
                <span class="docs-brand-sep">/</span>
                <span class="docs-brand-sub">Patch Notes</span>
            </a>
            <div class="docs-header-actions">
                <a href="/" class="docs-back-btn">
                    <i class="fas fa-arrow-left"></i> App
                </a>
                <button class="docs-theme-btn" id="themeToggle" title="Alternar tema" aria-label="Alternar tema claro/escuro">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </div>
        </header>

        <!-- Conteúdo (preenchido via JS) -->
        <main id="docsMain">
            <!-- Skeleton de carregamento -->
            <div class="docs-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>A carregar patch notes…</p>
            </div>
        </main>

    </div>

    <script>
    // ── Tema ──────────────────────────────────────────────────────
    (function () {
        const saved = localStorage.getItem('neatpad-theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        updateThemeIcon(saved);
    })();

    document.getElementById('themeToggle').addEventListener('click', function () {
        const current = document.documentElement.getAttribute('data-theme');
        const next    = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('neatpad-theme', next);
        updateThemeIcon(next);
    });

    function updateThemeIcon(theme) {
        const icon = document.getElementById('themeIcon');
        if (!icon) return;
        icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }

    // ── Utilitários ───────────────────────────────────────────────
    function esc(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    // Extrai a primeira frase de um texto (para fallback de título)
    function _firstSentence(text) {
        if (!text) return '';
        const m = text.match(/^[^.\n]+/);
        return m ? m[0].trim() : text.trim();
    }
    // Extrai o texto após a primeira frase (para fallback de preview)
    function _afterFirstSentence(text) {
        if (!text) return '';
        const first = _firstSentence(text);
        return text.slice(first.length).trim().replace(/^[.,:]\s*/, '');
    }

    function badgeHtml(type) {
        const map = {
            feat:  { cls: 'pn-badge--feat',  icon: 'fa-star',         label: 'Nova Funcionalidade' },
            fix:   { cls: 'pn-badge--fix',   icon: 'fa-wrench',       label: 'Correção' },
            other: { cls: 'pn-badge--other', icon: 'fa-circle-nodes', label: 'Atualização' },
        };
        const t = map[type] || map.other;
        return `<span class="pn-badge ${t.cls}"><i class="fas ${t.icon}"></i>${t.label}</span>`;
    }

    // ── Roteamento: lista vs detalhe ──────────────────────────────
    const params  = new URLSearchParams(window.location.search);
    const detailId = params.get('id') ? parseInt(params.get('id'), 10) : null;

    const main = document.getElementById('docsMain');

    if (detailId && detailId > 0) {
        renderDetail(detailId);
    } else {
        renderList();
    }

    // ── Vista de lista ────────────────────────────────────────────
    async function renderList() {
        main.innerHTML = `
            <div class="docs-intro">
                <h1>Patch Notes</h1>
                <p>Registo de todas as actualizações, correções e novas funcionalidades do NeatPad.</p>
            </div>
            <div id="pnList" class="pn-list">
                ${Array(4).fill(0).map(() => `
                    <div class="pn-skel">
                        <div class="pn-skel-line" style="width:30%;margin-bottom:14px"></div>
                        <div class="pn-skel-line" style="width:70%"></div>
                        <div class="pn-skel-line" style="width:90%"></div>
                    </div>
                `).join('')}
            </div>
        `;

        try {
            const resp = await fetch('api/get_patch_notes.php');
            const json = await resp.json();

            const list = document.getElementById('pnList');
            if (!json.success || !Array.isArray(json.data) || json.data.length === 0) {
                list.innerHTML = `
                    <div class="docs-state">
                        <i class="fas fa-inbox"></i>
                        <p>Ainda não há patch notes publicadas.</p>
                    </div>`;
                return;
            }

            list.innerHTML = json.data.map(pn => {
                const short = pn.commit_hash.slice(0, 7);

                // Campos estruturados (novos) ou fallback para gerado/mensagem
                const title   = pn.title   || _firstSentence(pn.generated_notes) || pn.commit_message;
                const preview = pn.summary || _afterFirstSentence(pn.generated_notes) || '';

                return `
                    <div class="pn-card" onclick="window.location.href='docs.html?id=${pn.id}'">
                        <div class="pn-card-top">
                            ${badgeHtml(pn.type)}
                            <span class="pn-date"><i class="fas fa-calendar-alt"></i> ${esc(pn.date_formatted)}</span>
                        </div>
                        <div class="pn-title">${esc(title)}</div>
                        ${preview ? `<div class="pn-preview">${esc(preview)}</div>` : ''}
                        <div class="pn-card-footer">
                            <a class="pn-sha" href="${esc(pn.commit_url)}" target="_blank" rel="noopener noreferrer"
                               onclick="event.stopPropagation()">
                                <i class="fab fa-github"></i>${esc(short)}
                            </a>
                            <span class="pn-read-more">
                                Ver detalhes <i class="fas fa-arrow-right"></i>
                            </span>
                        </div>
                    </div>
                `;
            }).join('');

        } catch (err) {
            document.getElementById('pnList').innerHTML = `
                <div class="docs-state">
                    <i class="fas fa-triangle-exclamation"></i>
                    <p>Não foi possível carregar as patch notes.<br>
                       <small>${esc(err.message)}</small></p>
                </div>`;
        }
    }

    // ── Vista de detalhe ──────────────────────────────────────────
    async function renderDetail(id) {
        main.innerHTML = `
            <a href="docs.html" class="docs-back-btn" style="display:inline-flex;margin-bottom:24px">
                <i class="fas fa-arrow-left"></i> Todas as Patch Notes
            </a>
            <div class="docs-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>A carregar…</p>
            </div>
        `;

        try {
            const resp = await fetch(`api/get_patch_notes.php?id=${id}`);
            const json = await resp.json();

            if (!json.success || !json.data) {
                main.innerHTML += `
                    <div class="docs-state">
                        <i class="fas fa-triangle-exclamation"></i>
                        <p>Patch note não encontrada.</p>
                    </div>`;
                return;
            }

            const pn    = json.data;
            const short = pn.commit_hash.slice(0, 7);

            // Campos estruturados com fallback gracioso
            const title   = pn.title   || _firstSentence(pn.generated_notes) || pn.commit_message;
            const summary = pn.summary || _afterFirstSentence(pn.generated_notes) || pn.generated_notes || pn.commit_message;
            const changes = Array.isArray(pn.changes) && pn.changes.length ? pn.changes : null;
            const impact  = pn.impact  || null;

            document.title = `${title} — NeatPad Patch Notes`;

            // Bloco de lista de alterações (só quando disponível)
            const changesBlock = changes ? `
                <div class="pn-detail-changes">
                    <div class="pn-detail-section-label">O que mudou</div>
                    <ul class="pn-changes-list">
                        ${changes.map(c => `<li>${esc(c)}</li>`).join('')}
                    </ul>
                </div>
            ` : '';

            // Bloco de impacto (só quando disponível)
            const impactBlock = impact ? `
                <div class="pn-detail-impact">
                    <i class="fas fa-circle-check"></i>
                    <span class="pn-detail-impact-text">${esc(impact)}</span>
                </div>
            ` : '';

            main.innerHTML = `
                <a href="docs.html" class="docs-back-btn" style="display:inline-flex;margin-bottom:24px">
                    <i class="fas fa-arrow-left"></i> Todas as Patch Notes
                </a>

                <div class="pn-detail-header">
                    <div class="pn-detail-top">
                        ${badgeHtml(pn.type)}
                        <span class="pn-detail-date">
                            <i class="fas fa-calendar-alt"></i> ${esc(pn.date_formatted)}
                        </span>
                    </div>
                    <h1 class="pn-detail-title">${esc(title)}</h1>
                </div>

                <div class="pn-detail-body">${esc(summary)}</div>

                ${changesBlock}
                ${impactBlock}

                <div class="pn-detail-commit">
                    <div style="flex:1;min-width:0;">
                        <div class="pn-detail-commit-label">Commit original</div>
                        <div class="pn-detail-commit-msg">${esc(pn.commit_message)}</div>
                        <a class="pn-detail-commit-link" href="${esc(pn.commit_url)}"
                           target="_blank" rel="noopener noreferrer">
                            <i class="fab fa-github"></i>
                            Ver ${esc(short)} no GitHub
                            <i class="fas fa-arrow-up-right-from-square" style="font-size:10px"></i>
                        </a>
                    </div>
                </div>
            `;

        } catch (err) {
            main.innerHTML += `
                <div class="docs-state">
                    <i class="fas fa-triangle-exclamation"></i>
                    <p>Erro ao carregar patch note.<br><small>${esc(err.message)}</small></p>
                </div>`;
        }
    }
    </script>
</body>
</html>
